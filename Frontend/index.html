<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarePlus Hospital - Login & Register</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <div class="forms-container">
            <!-- Login Form -->
            <div class="form-wrapper login-form active" id="loginForm">
                <div class="form-header">
                    <h1>🏥 CarePlus Hospital</h1>
                    <h2>Login to Your Account</h2>
                    <p>Welcome back! Please login to continue</p>
                </div>
                
                <form class="form" action="#" method="POST">
                    <div class="input-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" name="email" placeholder="Enter your email" required>
                        <span class="icon">✉️</span>
                    </div>
                    
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" placeholder="Enter your password" required>
                        <span class="icon">🔒</span>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Login</button>
                    
                    <div class="form-divider">
                        <span>OR</span>
                    </div>
                    
                    <button type="button" class="btn btn-social btn-google">
                        <span class="social-icon">G</span>
                        Login with Google
                    </button>
                    
                    <p class="switch-form">
                        Don't have an account? 
                        <a href="#" class="switch-link" id="showRegister">Register here</a>
                    </p>
                </form>
            </div>

            <!-- Registration Form -->
            <div class="form-wrapper register-form" id="registerForm">
                <div class="form-header">
                    <h1>🏥 CarePlus Hospital</h1>
                    <h2>Create an Account</h2>
                    <p>Join us today! Fill in your details to register</p>
                </div>
                
                <form class="form" action="#" method="POST">
                    <div class="input-group">
                        <label for="register-name">Full Name</label>
                        <input type="text" id="register-name" name="name" placeholder="Enter your full name" required>
                        <span class="icon">👤</span>
                    </div>
                    
                    <div class="input-group">
                        <label for="register-email">Email Address</label>
                        <input type="email" id="register-email" name="email" placeholder="Enter your email" required>
                        <span class="icon">✉️</span>
                    </div>
                    
                    <div class="input-group">
                        <label for="register-phone">Phone Number</label>
                        <input type="tel" id="register-phone" name="phone" placeholder="Enter your phone number" required>
                        <span class="icon">📱</span>
                    </div>
                    
                    <div class="input-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" name="password" placeholder="Create a password" required>
                        <span class="icon">🔒</span>
                    </div>
                    
                    <div class="input-group">
                        <label for="register-confirm-password">Confirm Password</label>
                        <input type="password" id="register-confirm-password" name="confirm-password" placeholder="Confirm your password" required>
                        <span class="icon">🔒</span>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="terms" required>
                            <span>I agree to the <a href="#">Terms & Conditions</a></span>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Register</button>
                    
                    <div class="form-divider">
                        <span>OR</span>
                    </div>
                    
                    <button type="button" class="btn btn-social btn-google">
                        <span class="social-icon">G</span>
                        Register with Google
                    </button>
                    
                    <p class="switch-form">
                        Already have an account? 
                        <a href="#" class="switch-link" id="showLogin">Login here</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Toggle between login and register forms
        const showRegister = document.getElementById('showRegister');
        const showLogin = document.getElementById('showLogin');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        showRegister.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.classList.remove('active');
            registerForm.classList.add('active');
        });

        showLogin.addEventListener('click', (e) => {
            e.preventDefault();
            registerForm.classList.remove('active');
            loginForm.classList.add('active');
        });
    </script>
</body>
</html>
